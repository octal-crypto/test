            createCanvas(width, height);
            noiseSeed(tokenId);
            noLoop();
            noStroke();
            rectMode(CENTER);
            colorMode(HSL);
            pixelDensity(density);
            o = noise;
            f = fill;
            b = noFill;
            q = width;
            a = height;
            //Universe
            yy = parseInt(hash.substring(0, 1));

            //border
            ci = ci[parseInt(hash.substring(1, 2))];
            //resolution
            w = s[parseInt(hash.substring(2, 3))];
            //warpSpeed
            x = parseInt(hash.substring(3, 4));
            //Folds

            zz = parseInt(hash.substring(4, 5));

            aa = nv[x][0];
            vb = nv[x][1];
            gb = ov[x][zz];
            ff = [0.00001, aa];

            //palette
            z = parseInt(hash.substring(5, 6));
            z2 = z + 1;
            //twoface
            g = parseInt(hash.substring(6, 7)) + 1;
            //Water          
            nnw = ff[parseInt(hash.substring(7, 8))];
        }

        function draw() {
            background(p[z][10]);

            if (x == 2 || x == 3) {
                nn = nnw;
            } else {
                nn = aa;
            }

            for (let x = 25; x <= q - 25; x += w) {
                for (let y = 25; y <= a - 25; y += w) {
                    //bise stuff
                    n = o(x * nn, y * aa);
                    n2 = o(x * vb, y * vb);
                    n3 = o((x + gb * n) * aa, (y + gb * n2) * vb);
                    n4 = o((x + gb * n3) * aa, (y + gb * n3) * vb);
                    n5 = o((x + gb * n4) * aa, (y + gb * n4) * vb);
                    //if genlight universe
                    if (yy == 0) {
                        if (x < q / g) {
                            if (n5 > 0.58) {
                                b();
                            } else if (n5 > 0.55) {
                                f(p[z][0]);
                            } else if (n5 > 0.53) {
                                f(p[z][1]);
                            } else if (n5 > 0.5) {
                                f(p[z][2]);
                            } else if (n5 > 0.47) {
                                f(p[z][3]);
                            } else if (n5 > 0.44) {
                                b();
                            } else if (n5 > 0.41) {
                                f(p[z][4]);
                            } else if (n5 > 0.38) {
                                f(p[z][5]);
                            } else if (n5 > 0.35) {
                                f(p[z][6]);
                            } else if (n5 > 0.31) {
                                f(p[z][7]);
                            } else if (n5 > 0.28) {
                                f(p[z][8]);
                            } else if (n5 > 0.25) {
                                f(p[z][9]);
                            } else {
                                b();
                            }
                        } else {
                            if (n5 > 0.58) {
                                b();
                            } else if (n5 > 0.55) {
                                f(p[z2][0]);
                            } else if (n5 > 0.53) {
                                f(p[z2][1]);
                            } else if (n5 > 0.5) {
                                f(p[z2][2]);
                            } else if (n5 > 0.47) {
                                f(p[z2][3]);
                            } else if (n5 > 0.44) {
                                b();
                            } else if (n5 > 0.41) {
                                f(p[z2][4]);
                            } else if (n5 > 0.38) {
                                f(p[z2][5]);
                            } else if (n5 > 0.35) {
                                f(p[z2][6]);
                            } else if (n5 > 0.31) {
                                f(p[z2][7]);
                            } else if (n5 > 0.28) {
                                f(p[z2][8]);
                            } else if (n5 > 0.25) {
                                f(p[z2][9]);
                            } else {
                                b();
                            }
                        }
                        //if monoverse
                    } else if (yy == 1) {
                        if (n5 > 0.6) {
                            b();
                        } else if (n5 > 0.4) {
                            f(p[z][3]);
                        } else {
                            b();
                        }
                        //if p5verse
                    } else {
                        f(n2 * 1000, n5 * 100, n5 * 100);
                    }
                    rect(x, y, w);
                }
            }
            if (ci == 0) {
                push();
                b();
                stroke(p[z][10]);
                strokeWeight(1570);
                circle(q / 2, a / 2, 2000);
                pop();
            } else {
            }
            push();
            textSize(3);
            textAlign(RIGHT);
            f(p[z][11]);
            text("Folded Faces. 2022.", q - 25, a - 15);
            text(hash, q - 25, a - 10);
            pop();
        }
