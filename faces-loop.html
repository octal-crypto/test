<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script>
        // Parse resolution and pixel density from URL
        var query = decodeURIComponent(window.location.href.slice(window.location.href.lastIndexOf("?")+1));
        var settings = query.split("&");
        settings.forEach(s => {
            s = s.split("=");
            if (s[0] == "density") density = parseInt(s[1]);
            if (s[0] == "resolution") resolution = parseFloat(s[1]);
        })

        // For converting token id to hash
        var web3 = new Web3(new Web3.providers.HttpProvider("https://rpc.flashbots.net"));
        var faces = new web3.eth.Contract([
        {
            "name": "_tokenIdToHash", "stateMutability": "view", "type": "function",
            "inputs": [ { "internalType": "uint256", "name": "_tokenId", "type": "uint256" } ],
            "outputs": [ { "internalType": "string", "name": "", "type": "string" } ]
        },
        ], "0xf01DfAC37DD149Cb686E05d06cd21930B011F10F");
        
        // Initial nonsense
        var p5Sketch = new p5(sketch);
        tokenId = -1;
        hash = "00000000000000";

        function sketch(p5js) {
            p5js.setup = function() {
                width = 700;
                height = 950;
                c = [0, 1];
                n = [0, 1];
                nnw = 0;
                ci = [0, 1];

                nv = [
                    [0.001, 0.0025],
                    [0.0025, 0.01],
                    [0.01, 0.0025],
                    [0.0025, 0.001],
                    [0.001, 0.001],
                ];

                ov = [
                    [4500, 5500, 6500, 8000],
                    [750, 950, 1150, 1250],
                    [750, 950, 1150, 1250],
                    [4500, 5500, 6500, 8000],
                    [4000, 5000, 6000, 15000],
                ];

                p = [
                    [
                        "#65010c",
                        "#cb1b16",
                        "#ef3c2d",
                        "#f26a4f",
                        "#f29479",
                        "#fedfd4",
                        "#9dcee2",
                        "#4091c9",
                        "#1368aa",
                        "#033270",
                        "#000",
                        "#faebd7",
                    ],

                    [
                        "#0f3375",
                        "#13459c",
                        "#1557c0",
                        "#196bde",
                        "#2382f7",
                        "#4b9cf9",
                        "#77b6fb",
                        "#a4cefc",
                        "#cce4fd",
                        "#e8f3fe",
                        "#000",
                        "#faebd7",
                    ],

                    [
                        "#0e0e0e",
                        "#f3bc17",
                        "#d54b0c",
                        "#154255",
                        "#dcdcdc",
                        "#c0504f",
                        "#68b9b0",
                        "#ecbe2c",
                        "#2763ab",
                        "#ce4241",
                        "#faebd7",
                        "#000",
                    ],

                    [
                        "#ff0000",
                        "#fe1c00",
                        "#fd3900",
                        "#fc5500",
                        "#fb7100",
                        "#fb8e00",
                        "#faaa00",
                        "#f9c600",
                        "#f8e300",
                        "#f7ff00",
                        "#000",
                        "#faebd7",
                    ],

                    [
                        "#004733",
                        "#2b6a4d",
                        "#568d66",
                        "#a5c1ae",
                        "#f3f4f6",
                        "#dcdfe5",
                        "#df8080",
                        "#cb0b0a",
                        "#ad080f",
                        "#8e0413",
                        "#000",
                        "#faebd7",
                    ],

                    [
                        "#1e1619",
                        "#3c2831",
                        "#5d424e",
                        "#8c6677",
                        "#ad7787",
                        "#ac675b",
                        "#c86166",
                        "#f078b3",
                        "#ec8782",
                        "#dfde80",
                        "#faebd7",
                        "#000",
                    ],

                    [
                        "#008080",
                        "#008080",
                        "#178c8c",
                        "#f7ff00",
                        "#46a3a3",
                        "#5daeae",
                        "#74baba",
                        "#8bc5c5",
                        "#a2d1d1",
                        "#b5dada",
                        "#000",
                        "#faebd7",
                    ],

                    [
                        "#669900",
                        "#99cc33",
                        "#ccee66",
                        "#006699",
                        "#3399cc",
                        "#990066",
                        "#cc3399",
                        "#ff6600",
                        "#ff9900",
                        "#ffcc00",
                        "#000",
                        "#faebd7",
                    ],

                    [
                        "#000",
                        "#fff",
                        "#000",
                        "#fff",
                        "#000",
                        "#fff",
                        "#000",
                        "#fff",
                        "#000",
                        "#fff",
                        "#000",
                        "#fff",
                    ],

                    [
                        "#2c6e49",
                        "#618565",
                        "#969c81",
                        "#cbb39d",
                        "#e5beab",
                        "#ffc9b9",
                        "#f5ba9c",
                        "#ebab7f",
                        "#e19c62",
                        "#d68c45",
                        "#000",
                        "#faebd7",
                    ],

                    [
                        "#65010c",
                        "#cb1b16",
                        "#ef3c2d",
                        "#f26a4f",
                        "#f29479",
                        "#fedfd4",
                        "#9dcee2",
                        "#4091c9",
                        "#1368aa",
                        "#033270",
                        "#faebd7",
                        "#000",
                    ],
                ];

                p5js.createCanvas(width, height);
                p5js.noiseSeed(tokenId);
                p5js.noLoop();
                p5js.noStroke();
                p5js.rectMode(p5js.CENTER);
                p5js.colorMode(p5js.HSL);
                p5js.pixelDensity(density);
                o = p5js.noise;
                // f = p5js.fill;
                // b = p5js.noFill;
                q = width;
                a = height;
                //Universe
                yy = parseInt(hash.substring(0, 1));

                //border
                ci = ci[parseInt(hash.substring(1, 2))];
                //resolution
                w = resolution;//s[parseInt(hash.substring(2, 3))];
                //warpSpeed
                x = parseInt(hash.substring(3, 4));
                //Folds

                zz = parseInt(hash.substring(4, 5));

                aa = nv[x][0];
                vb = nv[x][1];
                gb = ov[x][zz];
                ff = [0.00001, aa];

                //palette
                z = parseInt(hash.substring(5, 6));
                z2 = z + 1;
                //twoface
                g = parseInt(hash.substring(6, 7)) + 1;
                //Water          
                nnw = ff[parseInt(hash.substring(7, 8))];
            }

        p5js.draw = function() {
            p5js.background(p[z][10]);

            if (x == 2 || x == 3) {
                nn = nnw;
            } else {
                nn = aa;
            }

            for (let x = 25; x <= q - 25; x += w) {
                for (let y = 25; y <= a - 25; y += w) {
                    //bise stuff
                    n = o(x * nn, y * aa);
                    n2 = o(x * vb, y * vb);
                    n3 = o((x + gb * n) * aa, (y + gb * n2) * vb);
                    n4 = o((x + gb * n3) * aa, (y + gb * n3) * vb);
                    n5 = o((x + gb * n4) * aa, (y + gb * n4) * vb);
                    //if genlight universe
                    if (yy == 0) {
                        if (x < q / g) {
                            if (n5 > 0.58) {
                                p5js.noFill();
                            } else if (n5 > 0.55) {
                                p5js.fill(p[z][0]);
                            } else if (n5 > 0.53) {
                                p5js.fill(p[z][1]);
                            } else if (n5 > 0.5) {
                                p5js.fill(p[z][2]);
                            } else if (n5 > 0.47) {
                                p5js.fill(p[z][3]);
                            } else if (n5 > 0.44) {
                                p5js.noFill();
                            } else if (n5 > 0.41) {
                                p5js.fill(p[z][4]);
                            } else if (n5 > 0.38) {
                                p5js.fill(p[z][5]);
                            } else if (n5 > 0.35) {
                                p5js.fill(p[z][6]);
                            } else if (n5 > 0.31) {
                                p5js.fill(p[z][7]);
                            } else if (n5 > 0.28) {
                                p5js.fill(p[z][8]);
                            } else if (n5 > 0.25) {
                                p5js.fill(p[z][9]);
                            } else {
                                p5js.noFill();
                            }
                        } else {
                            if (n5 > 0.58) {
                                p5js.noFill();
                            } else if (n5 > 0.55) {
                                p5js.fill(p[z2][0]);
                            } else if (n5 > 0.53) {
                                p5js.fill(p[z2][1]);
                            } else if (n5 > 0.5) {
                                p5js.fill(p[z2][2]);
                            } else if (n5 > 0.47) {
                                p5js.fill(p[z2][3]);
                            } else if (n5 > 0.44) {
                                p5js.noFill();
                            } else if (n5 > 0.41) {
                                p5js.fill(p[z2][4]);
                            } else if (n5 > 0.38) {
                                p5js.fill(p[z2][5]);
                            } else if (n5 > 0.35) {
                                p5js.fill(p[z2][6]);
                            } else if (n5 > 0.31) {
                                p5js.fill(p[z2][7]);
                            } else if (n5 > 0.28) {
                                p5js.fill(p[z2][8]);
                            } else if (n5 > 0.25) {
                                p5js.fill(p[z2][9]);
                            } else {
                                p5js.noFill();
                            }
                        }
                        //if monoverse
                    } else if (yy == 1) {
                        if (n5 > 0.6) {
                            p5js.noFill();
                        } else if (n5 > 0.4) {
                            p5js.fill(p[z][3]);
                        } else {
                            p5js.noFill();
                        }
                        //if p5verse
                    } else {
                        p5js.fill(n2 * 1000, n5 * 100, n5 * 100);
                    }
                    p5js.rect(x, y, w);
                }
            }
            if (ci == 0) {
                p5js.push();
                p5js.noFill();
                p5js.stroke(p[z][10]);
                p5js.strokeWeight(1570);
                p5js.circle(q / 2, a / 2, 2000);
                p5js.pop();
            } else {
            }
            p5js.push();
            p5js.textSize(3);
            p5js.textAlign(p5js.RIGHT);
            p5js.fill(p[z][11]);
            p5js.text("Folded Faces. 2022.", q - 25, a - 15);
            p5js.text(hash, q - 25, a - 10);
            p5js.pop();
            p5js.saveCanvas();
            faces.methods._tokenIdToHash(++tokenId).call().then(h => {
                hash = h;
                p5Sketch.remove();
                p5Sketch = new p5(sketch);
            });
        }}
    </script>
</body></html>
